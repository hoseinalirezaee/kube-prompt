name: test
on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Lint checking on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: Check goimports formatting
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          "$RUNNER_TEMP/bin/golangci-lint" fmt --no-config --enable=goimports --diff

      - name: Running golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --no-config --enable-only=misspell ./...

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: Running go tests
        run: make test
